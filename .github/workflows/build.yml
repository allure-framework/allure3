name: Build project

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "yarn"
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
      - name: Build the project
        run: yarn build
      - name: Lint Project
        run: yarn lint
      - name: Check formatting
        run: yarn format:check
      - name: Type-aware lint
        run: yarn lint:type

  test:
    name: Core + E2E tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "yarn"
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
            ~/AppData/Local/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('packages/e2e/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Install playwright for E2E
        run: yarn workspace @allurereport/e2e playwright install chromium firefox webkit
      - name: Install playwright dependencies
        if: runner.os == 'Linux'
        run: yarn workspace @allurereport/e2e playwright install-deps
      - name: Build project
        run: yarn build
      - name: Test core workspaces
        timeout-minutes: 35
        run: yarn allure run --config=./allurerc.gate.mjs --environment=${{ matrix.os }}-core --dump=allure-results-${{ matrix.os }}-core -- yarn test:ci:core
      - name: Upload core test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: allure-results-${{ matrix.os }}-core
          path: ./allure-results-${{ matrix.os }}-core.zip
      - name: Test E2E workspace
        if: always()
        timeout-minutes: 45
        run: yarn allure run --config=./allurerc.gate.mjs --environment=${{ matrix.os }}-e2e --dump=allure-results-${{ matrix.os }}-e2e -- yarn workspace @allurereport/e2e test
      - name: Upload E2E results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: allure-results-${{ matrix.os }}-e2e
          path: ./allure-results-${{ matrix.os }}-e2e.zip

  report:
    needs: [test]
    name: Build report
    runs-on: ubuntu-latest
    if: always()
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      checks: write
    env:
      ALLURE_SERVICE_ACCESS_TOKEN: ${{ secrets.ALLURE_SERVICE_ACCESS_TOKEN }}
      ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
      ALLURE_PROJECT_ID: ${{ secrets.ALLURE_PROJECT_ID }}
      ALLURE_ENDPOINT: ${{ secrets.ALLURE_ENDPOINT }}
      ALLURE_LAUNCH_TAGS: "${{ secrets.ALLURE_LAUNCH_TAGS }}, ${{ github.event_name }}"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "yarn"
      - name: Download allure results from Ubuntu core
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          name: allure-results-ubuntu-latest-core
          path: ./
      - name: Download allure results from macOS core
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          name: allure-results-macos-latest-core
          path: ./
      - name: Download allure results from Windows core
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          name: allure-results-windows-latest-core
          path: ./
      - name: Download allure results from E2E Ubuntu
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          name: allure-results-ubuntu-latest-e2e
          path: ./
      - name: Download allure results from E2E macOS
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          name: allure-results-macos-latest-e2e
          path: ./
      - name: Download allure results from E2E Windows
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          name: allure-results-windows-latest-e2e
          path: ./
      - name: Generate report
        run: yarn dlx allure generate --config=./allurerc.mjs --dump="allure-results-*.zip" --output=./allure-report
      - name: Allure Report Official
        uses: allure-framework/allure-action@v0
        with:
          report-directory: "./allure-report"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
