name: Build project

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "yarn"
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
      - name: Build the project
        run: yarn build
      - name: Lint Project
        run: yarn lint
      - name: Check formatting
        run: yarn format:check
      # - name: Type-aware lint
      #   run: yarn lint:type

  test:
    needs: lint
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "yarn"
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
      - name: Install playwright for static server
        run: yarn workspace @allurereport/static-server playwright install chromium
      - name: Install playwright for e2e
        run: yarn workspace @allurereport/e2e playwright install chromium firefox webkit
      - name: Install playwright dependencies for e2e
        run: yarn workspace @allurereport/e2e playwright install-deps
      - name: Build project
        run: yarn build
      - name: Test Project
        run: yarn allure run --config=./allurerc.gate.mjs --environment=${{ matrix.os }} --dump=allure-results-${{ matrix.os }} -- yarn test
      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: allure-results-${{ matrix.os }}
          path: ./allure-results-${{ matrix.os }}.zip

  report:
    needs: [lint, test]
    name: Build report
    runs-on: ubuntu-latest
    if: always()
    permissions:
      actions: read
      contents: write
      pull-requests: write
      checks: write
    env:
      ALLURE_SERVICE_ACCESS_TOKEN: ${{ secrets.ALLURE_SERVICE_ACCESS_TOKEN }}
      ALLURE_TOKEN: ${{ secrets.ALLURE_TOKEN }}
      ALLURE_PROJECT_ID: ${{ secrets.ALLURE_PROJECT_ID }}
      ALLURE_ENDPOINT: ${{ secrets.ALLURE_ENDPOINT }}
      ALLURE_LAUNCH_TAGS: "${{ secrets.ALLURE_LAUNCH_TAGS }}, ${{ github.event_name }}"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "yarn"
      - name: Download allure results from Ubuntu
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          name: allure-results-ubuntu-latest
          path: ./
      - name: Download allure results from macOS
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          name: allure-results-macos-latest
          path: ./
      - name: Download allure results from Windows
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          name: allure-results-windows-latest
          path: ./
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
      - name: Build project
        run: yarn build
      - name: Generate report
        env:
          ALLURE_PERF_METRICS: "1"
        run: yarn allure generate --config=./allurerc.mjs --dump="allure-results-*.zip" --output=./allure-report
      - name: Write perf metrics summary
        if: always()
        run: |
          node ./scripts/allure-perf-summary.mjs ./allure-report/allure-perf-metrics.json --output ./allure-report/allure-perf-metrics.md
          cat ./allure-report/allure-perf-metrics.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload perf metrics
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: allure-perf-metrics
          path: |
            ./allure-report/allure-perf-metrics.json
            ./allure-report/allure-perf-metrics.md
          if-no-files-found: ignore
      - name: Allure Report Official
        uses: allure-framework/allure-action@v0
        with:
          report-directory: "./allure-report"
          github-token: ${{ secrets.GITHUB_TOKEN }}

  perf-metrics-comment:
    needs: report
    name: Comment perf metrics
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    permissions:
      actions: read
      pull-requests: write
    steps:
      - name: Download perf metrics
        uses: actions/download-artifact@v6
        continue-on-error: true
        with:
          name: allure-perf-metrics
          path: ./allure-perf-metrics
      - name: Comment perf metrics on pull request
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("node:fs");
            const marker = "<!-- allure-perf-metrics -->";
            const summaryPath = "./allure-perf-metrics/allure-perf-metrics.md";
            const { owner, repo } = context.repo;
            const artifactsUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const summary = fs.existsSync(summaryPath) ? fs.readFileSync(summaryPath, "utf8") : "### Allure perf metrics\n\nMetrics file was not generated.\n";
            const body = `${marker}\n${summary}\nArtifacts: [allure-perf-metrics](${artifactsUrl})`;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const previous = comments.data.find((comment) => comment.user.type === "Bot" && comment.body?.includes(marker));

            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
